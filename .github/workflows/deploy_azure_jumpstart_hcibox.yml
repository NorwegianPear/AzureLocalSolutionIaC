name: Deploy Azure Jumpstart HCIBox
run-name: ${{ github.actor }} started HCIBox deployment with GitHub Actions

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region for deployment'
        required: true
        default: 'norwayeast'
        type: string
      deployBastion:
        description: 'Deploy Azure Bastion'
        required: false
        default: false
        type: boolean
      autoDeployClusterResource:
        description: 'Auto-deploy HCI cluster resource after VM setup'
        required: false
        default: true
        type: boolean
      autoUpgradeClusterResource:
        description: 'Auto-upgrade HCI cluster resource'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: pwsh

env:
  Location: ${{ github.event.inputs.location || 'norwayeast' }}
  ResourceGroupName: 'hcibox-rg'
  LogAnalyticsWorkspaceName: 'HCIBox-Workspace'

jobs:
  register-providers:
    runs-on: ubuntu-latest
    steps:
    - name: Connect to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURELOCALSOLUTIONIAC_CLIENTID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Register required Azure providers
      shell: bash
      run: |
        az provider register --namespace Microsoft.HybridCompute --wait
        az provider register --namespace Microsoft.GuestConfiguration --wait
        az provider register --namespace Microsoft.Kubernetes --wait
        az provider register --namespace Microsoft.KubernetesConfiguration --wait
        az provider register --namespace Microsoft.ExtendedLocation --wait
        az provider register --namespace Microsoft.AzureArcData --wait
        az provider register --namespace Microsoft.OperationsManagement --wait
        az provider register --namespace Microsoft.AzureStackHCI --wait
        az provider register --namespace Microsoft.ResourceConnector --wait
        az provider register --namespace Microsoft.OperationalInsights --wait

    - name: Get HCI Resource Provider Object ID
      id: get-provider-id
      shell: bash
      run: |
        PROVIDER_ID=$(az ad sp list --display-name "Microsoft.AzureStackHCI" --query "[0].id" -o tsv)
        echo "spnProviderId=$PROVIDER_ID" >> $GITHUB_OUTPUT

    outputs:
      spnProviderId: ${{ steps.get-provider-id.outputs.spnProviderId }}

  deploy-hcibox:
    runs-on: ubuntu-latest
    needs: register-providers
    environment: dev
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install PowerShell Modules
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $modules = @("Az.Accounts", "Az.Resources", "Az.KeyVault")
        foreach ($module in $modules) {
          Write-Host "Installing module $module..."
          Install-Module -Name $module -Force -AllowClobber -ErrorAction Stop
          Write-Host "Module $module installed successfully."
        }

    - name: Connect to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURELOCALSOLUTIONIAC_CLIENTID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        enable-AzPSSession: true

    - name: Create Resource Group
      run: |
        New-AzResourceGroup -Name "${{ env.ResourceGroupName }}" -Location "${{ env.Location }}" -Force

    - name: Deploy HCIBox
      run: |
        $spnSecret = ConvertTo-SecureString -String "${{ secrets.AZURELOCALSOLUTIONIAC_SECRET }}" -AsPlainText -Force
        $adminPassword = ConvertTo-SecureString -String "${{ secrets.HCIBOX_ADMIN_PASSWORD }}" -AsPlainText -Force

        New-AzResourceGroupDeployment `
          -Name "HCIBox-${{ github.run_number }}" `
          -ResourceGroupName "${{ env.ResourceGroupName }}" `
          -TemplateFile "./azure_jumpstart_hcibox/bicep/main.bicep" `
          -spnClientId "${{ secrets.AZURELOCALSOLUTIONIAC_CLIENTID }}" `
          -spnClientSecret $spnSecret `
          -spnTenantId "${{ secrets.AZURE_TENANT_ID }}" `
          -spnProviderId "${{ needs.register-providers.outputs.spnProviderId }}" `
          -windowsAdminUsername "arcdemo" `
          -windowsAdminPassword $adminPassword `
          -logAnalyticsWorkspaceName "${{ env.LogAnalyticsWorkspaceName }}" `
          -deployBastion ${{ github.event.inputs.deployBastion || false }} `
          -autoDeployClusterResource ${{ github.event.inputs.autoDeployClusterResource || true }} `
          -autoUpgradeClusterResource ${{ github.event.inputs.autoUpgradeClusterResource || false }} `
          -location "${{ env.Location }}" `
          -Verbose
